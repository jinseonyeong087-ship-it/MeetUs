<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeetUs - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body class="login-body">
    <main class="login-container">
      <div class="login-card">
        <div class="login-header">
          <h1 class="login-logo">MeetUs</h1>
          <p class="login-subtitle">AI 회의 요약 & To-Do 관리 시스템</p>
        </div>
        
        <form id="login-form" class="login-form">
          <div class="form-group">
            <label for="email-input">이메일</label>
            <input id="email-input" type="email" placeholder="name@meetus.app" required />
          </div>
          
          <div class="form-group">
            <label for="password-input">비밀번호</label>
            <input id="password-input" type="password" placeholder="비밀번호 입력" required />
          </div>
          
          <button class="login-btn" type="submit">로그인</button>
        </form>
        
        <p id="login-error" class="login-error"></p>
        
        <div class="login-info">
          <div class="info-item">
            <h3>워크스페이스 기반 협업</h3>
            <p>팀 단위로 회의를 관리하고 AI가 자동으로 요약과 개인별 To-Do를 생성합니다.</p>
          </div>
          
          <div class="info-item">
            <h3>개인 음성 업로드</h3>
            <p>개인 보관함에서 음성 메모, 인터뷰 등을 동일한 AI 분석으로 관리할 수 있습니다.</p>
          </div>
          
          <div class="demo-notice">
            <p><strong>데모 모드:</strong> 임의 이메일과 비밀번호로 체험 가능</p>
          </div>
        </div>
      </div>
      
      <div class="login-bg">
        <div class="bg-pattern"></div>
      </div>
    </main>
    
    <script type="module" src="./pages/login.js"></script>
  </body>
</html>
