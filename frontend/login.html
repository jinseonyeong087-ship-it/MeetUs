<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeetUs - 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-panel">
        <p class="eyebrow" style="color: rgba(255,255,255,0.68);">AI 회의 요약 및 To-Do 아카이브</p>
        <h1>MeetUs</h1>
        <div class="sidebar-card">
          <h3>프로토타입 범위</h3>
          <ul>
            <li>회의 음성 업로드</li>
            <li>전사 결과 확인</li>
            <li>AI 요약 확인</li>
            <li>액션 아이템 추출</li>
            <li>아카이브 검색</li>
          </ul>
        </div>
      </section>

      <section class="auth-card-wrap">
        <div class="auth-card">
          <section id="login-section">
            <p class="eyebrow">Login</p>
            <h2>MeetUs</h2>
            <p class="muted">로그인 ID와 비밀번호를 입력하면 로그인할 수 있습니다.</p>

            <form id="login-form" class="auth-form">
              <div class="field">
                <label for="user-id-input">ID</label>
                <input id="user-id-input" type="text" placeholder="아이디를 입력하세요" required />
              </div>
              <div class="field">
                <label for="password-input">비밀번호</label>
                <input id="password-input" type="password" placeholder="비밀번호를 입력하세요" required />
              </div>
              <button class="btn btn-primary" type="submit">로그인</button>
            </form>
            <button id="go-signup-btn" class="auth-switch-link" type="button">회원가입 하기</button>

            <p id="login-error" class="muted" style="margin-top: 12px;"></p>
          </section>

          <section id="signup-section" class="hidden">
            <p class="eyebrow">Sign Up</p>
            <h2>MeetUs</h2>

            <form id="signup-form" class="auth-form">
              <div class="field">
                <label for="signup-user-id-input">유저 ID</label>
                <input id="signup-user-id-input" type="text" placeholder="예: usr_010" required />
              </div>
              <div class="field">
                <label for="signup-name-input">이름</label>
                <input id="signup-name-input" type="text" placeholder="이름 입력" required />
              </div>
              <div class="field">
                <label for="signup-email-input">이메일</label>
                <input id="signup-email-input" type="email" placeholder="name@meetus.app" required />
              </div>
              <div class="field">
                <label for="signup-password-input">비밀번호</label>
                <input id="signup-password-input" type="password" placeholder="비밀번호 입력" required />
              </div>
              <button class="btn btn-primary" type="submit">회원가입</button>
            </form>
            <button id="go-login-btn" class="auth-switch-link" type="button">로그인 하러가기</button>

            <p id="signup-error" class="muted" style="margin-top: 12px;"></p>
          </section>
        </div>
      </section>
    </main>

    <script src="./runtime-config.js"></script>
    <script type="module" src="./pages/login.js"></script>
  </body>
</html>
