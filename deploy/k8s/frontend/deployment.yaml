apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-minutes-frontend
  labels:
    app: ai-minutes-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-minutes-frontend
  template:
    metadata:
      labels:
        app: ai-minutes-frontend
    spec:
      containers:
        - name: frontend
          image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/ai-minutes-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
