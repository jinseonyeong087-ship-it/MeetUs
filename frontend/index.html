<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeetUs - Workspace Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <header class="main-header">
      <button id="mobile-menu-btn" class="mobile-menu-btn">☰</button>
      <a href="./" class="header-logo">MeetUs</a>
      <div class="header-search">
        <svg class="header-search-icon" viewBox="0 0 24 24">
          <path d="M11 19a8 8 0 100-16 8 8 0 000 16zm5-5l4.35 4.35"/>
        </svg>
        <input type="text" placeholder="회의 검색..." class="header-search-input" id="global-search">
      </div>
      <div class="header-user">
        <span id="header-user-name">사용자</span>
        <button id="logout-btn" class="header-logout-btn">로그아웃</button>
      </div>
    </header>

    <div id="mobile-overlay" class="mobile-overlay" aria-hidden="true"></div>

    <main class="workspace">
      <aside class="sidebar">
        <h1>MeetUs</h1>
        <p class="muted">회의 요약 & To-Do Archive</p>
        <nav class="menu">
          <a class="menu-item" href="./workspaces.html">Workspaces</a>
          <a class="menu-item active" href="./index.html">Archive</a>
          <a class="menu-item" href="./meeting.html?id=mtg-001">Meeting Detail</a>
        </nav>
        
        <button class="menu-item workspace-create-btn" type="button" id="create-workspace-btn">
          + 워크스페이스 생성
        </button>
      </aside>

      <section class="panel left-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Upload Page</p>
            <h2>회의 생성 및 업로드</h2>
          </div>
        </div>
        <div id="upload-root"></div>

        <hr class="divider" />

        <div class="panel-head">
          <div>
            <p class="eyebrow">State Summary</p>
            <h2>상태 요약</h2>
          </div>
          <span id="meeting-count" class="muted">총 0건</span>
        </div>
        <div id="status-stats" class="stat-grid"></div>
      </section>

      <section class="panel main-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Archive Page</p>
            <h2>회의 Archive</h2>
          </div>
          <div class="inline-actions">
            <button id="reset-btn" class="btn" type="button">목업 초기화</button>
            <button id="reload-btn" class="btn" type="button">새로고침</button>
          </div>
        </div>
        <div class="filter-row">
          <label class="field compact">
            <span>검색</span>
            <input id="search-input" type="search" placeholder="회의 제목 또는 참여자 검색" />
          </label>
          <label class="field compact">
            <span>상태</span>
            <select id="status-filter">
              <option value="ALL">전체</option>
              <option value="CREATED">CREATED</option>
              <option value="UPLOADED">UPLOADED</option>
              <option value="PROCESSING">PROCESSING</option>
              <option value="COMPLETED">COMPLETED</option>
              <option value="FAILED">FAILED</option>
            </select>
          </label>
          <label class="field compact">
            <span>정렬</span>
            <select id="sort-filter">
              <option value="date-desc">최신순</option>
              <option value="date-asc">오래된순</option>
              <option value="status">상태순</option>
            </select>
          </label>
        </div>
        <div id="meeting-list" class="meeting-list"></div>
        <p id="empty-state" class="empty-state hidden">조건에 맞는 회의가 없습니다.</p>
      </section>

      <section class="panel info-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Personal Upload</p>
            <h2>개인 음성 업로드</h2>
          </div>
        </div>
        
        <!-- Personal Upload Zone -->
        <div class="personal-upload-zone" id="personal-upload-zone">
          <svg class="upload-icon" viewBox="0 0 24 24">
            <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z" />
          </svg>
          <h3>음성 파일 업로드</h3>
          <p>개인 보관함에 바로 업로드</p>
          <input type="file" id="personal-audio-input" accept=".m4a" style="display: none;">
        </div>

        <div class="sidebar-note">
          <p class="eyebrow">Workspace Stats</p>
          <dl class="meta-list">
            <div>
              <dt>총 회의</dt>
              <dd id="total-meetings">-</dd>
            </div>
            <div>
              <dt>처리 완료</dt>
              <dd id="completed-meetings">-</dd>
            </div>
            <div>
              <dt>처리 중</dt>
              <dd id="processing-meetings">-</dd>
            </div>
          </dl>
        </div>
      </section>
    </main>

    <!-- Workspace Create Modal -->
    <div id="workspace-modal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h2>새 워크스페이스 만들기</h2>
          <button type="button" class="modal-close" id="close-modal">&times;</button>
        </div>
        <form id="workspace-form" class="modal-form">
          <label class="field">
            <span>워크스페이스 이름 *</span>
            <input id="workspace-name-input" type="text" placeholder="예: Product Team" required />
          </label>
          <label class="field">
            <span>설명</span>
            <input id="workspace-description-input" type="text" placeholder="워크스페이스 소개 (선택사항)" />
          </label>
          <div class="modal-actions">
            <button type="button" class="btn" id="cancel-modal">취소</button>
            <button type="submit" class="btn btn-primary">워크스페이스 생성</button>
          </div>
        </form>
        <p id="workspace-error" class="muted"></p>
      </div>
    </div>

    <script type="module" src="./pages/dashboard.js"></script>
  </body>
</html>
