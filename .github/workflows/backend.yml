name: backend-ci-cd

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: ai-minutes-core-api
  ECS_TASK_DEFINITION_TEMPLATE: backend/deploy/taskdef-core-api.template.json
  APPSPEC_TEMPLATE: backend/deploy/appspec-core-api.yaml
  ECS_CONTAINER_NAME: core-api
  IMAGE_TAG: ${{ github.sha }}
  CODEDEPLOY_APP_NAME: ai-minutes-backend-codedeploy-app
  CODEDEPLOY_DEPLOYMENT_GROUP: ai-minutes-backend-deployment-group

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TA_AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            ./backend

      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Summary
        run: |
          echo "Pushed image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"

      - name: Validate required deployment configuration
        run: |
          missing=0
          for key in ECS_CONTAINER_NAME CODEDEPLOY_APP_NAME CODEDEPLOY_DEPLOYMENT_GROUP; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub Actions variable: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Render ECS task definition
        run: |
          jq \
            --arg image "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}" \
            --arg containerName "${{ env.ECS_CONTAINER_NAME }}" \
            '
            .containerDefinitions[0].name = $containerName
            | .containerDefinitions[0].image = $image
            ' \
            "${{ env.ECS_TASK_DEFINITION_TEMPLATE }}" > taskdef-core-api.json

      - name: Register ECS task definition
        id: register-task-def
        run: |
          task_definition_arn=$(aws ecs register-task-definition \
            --cli-input-json file://taskdef-core-api.json \
            --region "${{ env.AWS_REGION }}" \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "task_definition_arn=$task_definition_arn" >> "$GITHUB_OUTPUT"

      - name: Render AppSpec
        run: |
          sed -e "s|<TASK_DEFINITION>|${{ steps.register-task-def.outputs.task_definition_arn }}|g" \
            "${{ env.APPSPEC_TEMPLATE }}" > appspec-core-api.yaml

      - name: Create CodeDeploy deployment
        run: |
          jq -Rs '{revisionType:"AppSpecContent", appSpecContent:{content:.}}' appspec-core-api.yaml > codedeploy-revision.json
          aws deploy create-deployment \
            --application-name "${{ env.CODEDEPLOY_APP_NAME }}" \
            --deployment-group-name "${{ env.CODEDEPLOY_DEPLOYMENT_GROUP }}" \
            --revision file://codedeploy-revision.json \
            --region "${{ env.AWS_REGION }}"

      - name: Deployment summary
        run: |
          echo "Registered task definition: ${{ steps.register-task-def.outputs.task_definition_arn }}"
          echo "Started CodeDeploy deployment for backend"
