name: Deploy AI Pipeline (SA) to Amazon ECR

on:
  push:
    branches:
      - main  # 최종 통합은 main 기준이므로 main으로 설정 (협의에 따라 develop 등으로 변경 가능)
    paths:
      - 'ai-pipeline/**' # 이 폴더 안의 파일이 변경될 때만 실행 (가장 핵심!)

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: ai-minutes-sa
  ECS_CLUSTER: meetus-sa-cluster
  ECS_SERVICE: meetus-sa-task-service-jnq91d3c
  ECS_TASK_DEFINITION_TEMPLATE: ai-pipeline/deploy/taskdef-sa.template.json
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.SA_AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cd ai-pipeline
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Register ECS task definition
        id: register-task-def
        shell: pwsh
        run: |
          $imageUri = "${{ steps.build-image.outputs.image }}"
          $taskDefPath = "${{ env.ECS_TASK_DEFINITION_TEMPLATE }}"
          $renderedTaskDefPath = Join-Path $env:RUNNER_TEMP "taskdef-rendered.json"

          Get-Content $taskDefPath -Raw `
            | ConvertFrom-Json `
            | ForEach-Object {
                $_.containerDefinitions[0].image = $imageUri
                $_
              } `
            | ConvertTo-Json -Depth 100 `
            | Set-Content $renderedTaskDefPath

          $taskDefArn = aws ecs register-task-definition `
            --cli-input-json file://$renderedTaskDefPath `
            --region "${{ env.AWS_REGION }}" `
            --query "taskDefinition.taskDefinitionArn" `
            --output text

          "task_definition_arn=$taskDefArn" >> $env:GITHUB_OUTPUT

      - name: Deploy updated task definition
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition ${{ steps.register-task-def.outputs.task_definition_arn }} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}
