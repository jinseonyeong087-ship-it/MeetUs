<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeetUs - 회의 목록</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar"></aside>

      <section class="content-shell">
        <header class="topbar">
          <div class="page-title">
            <p class="eyebrow">Meetings</p>
            <h2>회의 목록</h2>
            <p>최근 업로드된 회의와 처리 상태를 확인하고 상세 결과로 이동합니다.</p>
          </div>
          <div class="topbar-actions">
            <span id="current-workspace" class="muted"></span>
            <span id="current-user" class="muted"></span>
            <button id="reload-btn" class="btn hidden" type="button" aria-hidden="true" tabindex="-1">새로고침</button>
          </div>
        </header>

        <section class="card">
          <div class="filters">
            <div class="field">
              <label for="search-input">회의 검색</label>
              <input id="search-input" type="search" placeholder="회의 제목 또는 참여자 검색" />
            </div>
            <div class="field">
              <label for="date-filter">날짜 필터</label>
              <input id="date-filter" type="date" />
            </div>
            <div class="field">
              <label for="status-filter">처리 상태</label>
              <select id="status-filter">
                <option value="ALL">ALL</option>
                <option value="CREATED">CREATED</option>
                <option value="UPLOADED">UPLOADED</option>
                <option value="PROCESSING">PROCESSING</option>
                <option value="COMPLETED">COMPLETED</option>
                <option value="FAILED">FAILED</option>
              </select>
            </div>
            <div class="field">
              <label for="sort-filter">정렬</label>
              <select id="sort-filter">
                <option value="date-desc">최신순</option>
                <option value="date-asc">오래된순</option>
                <option value="status">상태순</option>
              </select>
            </div>
          </div>
        </section>

        <section id="meeting-list" class="meeting-list"></section>
        <div id="meeting-pagination" class="pagination hidden"></div>
        <p id="empty-state" class="empty-state hidden">조건에 맞는 회의가 없습니다.</p>
      </section>
    </main>

    <script src="./sidebar.js"></script>
    <script src="./mobile-nav.js"></script>
    <script src="./runtime-config.js"></script>
    <script type="module" src="./pages/meetingsPage.js"></script>
  </body>
</html>
