<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeetUs - 회의 상세</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <h1>MeetUs</h1>
        </div>
        <nav class="nav-group">
          <a class="nav-item" href="./dashboard.html">대시보드</a>
          <a class="nav-item" href="./upload.html">회의 업로드</a>
          <a class="nav-item active" href="./index.html">회의 목록</a>
          <a class="nav-item" href="./archive.html">아카이브</a>
        </nav>
        <div class="sidebar-card">
          <h3>보조 기능</h3>
          <p>Summary 복사, 다운로드, Transcript 섹션 접기 기능은 프로토타입 보조 기능으로 제공합니다.</p>
        </div>
        <div class="sidebar-footer">
          <button id="logout-btn" class="sidebar-logout-btn" type="button">로그아웃</button>
        </div>
      </aside>

      <section class="content-shell">
        <header class="topbar">
          <div class="page-title">
            <p class="eyebrow">Meeting Detail</p>
            <h2 id="meeting-title">회의 상세</h2>
            <p id="meeting-meta">회의 메타데이터를 불러오는 중입니다.</p>
          </div>
          <div class="topbar-actions">
            <span id="current-workspace" class="muted"></span>
            <span id="current-user" class="muted"></span>
            <a class="btn" href="./workspaces.html">워크스페이스</a>
            <a class="btn" href="./workspaces.html?modal=create">워크스페이스 생성</a>
            <button id="refresh-btn" class="btn" type="button">새로고침</button>
            <a class="btn" href="./index.html">목록으로</a>
          </div>
        </header>

        <article id="status-banner" class="card">
          <div class="card-head">
            <div>
              <p class="eyebrow">Processing Status</p>
              <h3 id="status-label">상태 확인 중</h3>
            </div>
            <button id="retry-btn" class="btn hidden" type="button">재처리</button>
          </div>
          <p id="status-description" class="muted">상태 정보를 불러오는 중입니다.</p>
        </article>

        <section class="detail-layout">
          <article class="card">
            <div class="card-head">
              <div>
                <p class="eyebrow">Transcript</p>
                <h3>화자별 전사</h3>
              </div>
              <button id="toggle-transcript-btn" class="btn" type="button">접기</button>
            </div>
            <div id="transcript-content" class="transcript-box"></div>
          </article>

          <div class="grid-two" style="grid-template-columns: 1fr; gap: 18px;">
            <article class="card">
              <div class="card-head">
                <div>
                <p class="eyebrow">AI Summary</p>
                <h3>요약</h3>
                </div>
              </div>
              <div id="summary-content" class="summary-box"></div>
              <div class="summary-actions">
                <button id="copy-summary-btn" class="btn" type="button">요약 복사</button>
                <button id="download-summary-btn" class="btn" type="button">요약 다운로드</button>
              </div>
            </article>

            <article class="card">
              <div class="card-head">
                <div>
                <p class="eyebrow">Key Decisions</p>
                <h3>결정 사항</h3>
                </div>
              </div>
              <div id="decision-root" class="todo-list"></div>
            </article>

            <article class="card">
              <div class="card-head">
                <div>
                <p class="eyebrow">Action Items</p>
                <h3>담당자별 To-Do</h3>
                </div>
              </div>
              <div id="todo-root" class="todo-group"></div>
            </article>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="./pages/meetingDetail.js"></script>
  </body>
</html>
