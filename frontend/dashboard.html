<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeetUs - 대시보드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <h1>MeetUs</h1>
        </div>
        <nav class="nav-group">
          <a class="nav-item active" href="./dashboard.html">대시보드</a>
          <a class="nav-item" href="./upload.html">회의 업로드</a>
          <a class="nav-item" href="./index.html">회의 목록</a>
          <a class="nav-item" href="./archive.html">아카이브</a>
        </nav>
        <div class="sidebar-card">
          <h3>프로토타입 범위</h3>
          <p>복잡한 협업 기능 없이 핵심 업로드, 요약, To-Do, 아카이브 흐름만 포함합니다.</p>
        </div>
        <div class="sidebar-footer">
          <button id="logout-btn" class="sidebar-logout-btn" type="button">로그아웃</button>
        </div>
      </aside>

      <section class="content-shell dashboard-shell">
        <header class="topbar">
          <div class="page-title">
            <p class="eyebrow">Dashboard</p>
            <h2>개요</h2>
            <p>현재 처리 현황과 최근 완료된 회의를 한눈에 확인합니다.</p>
          </div>
          <div class="topbar-actions">
            <span id="current-workspace" class="muted"></span>
            <span id="current-user" class="muted"></span>
            <a class="btn" href="./workspaces.html">워크스페이스</a>
            <a class="btn" href="./workspaces.html?modal=create">워크스페이스 생성</a>
            <a class="btn btn-primary" href="./upload.html">새 회의 업로드</a>
          </div>
        </header>

        <section id="metrics-grid" class="metrics-grid"></section>

        <section class="grid-two">
          <article class="card">
            <div class="card-head">
              <div>
                <p class="eyebrow">최근 회의</p>
                <h3>최신 활동</h3>
              </div>
            </div>
            <div id="recent-meetings" class="meeting-list"></div>
          </article>

          <article class="card">
            <div class="card-head">
              <div>
                <p class="eyebrow">최근 완료</p>
                <h3>최신 요약</h3>
              </div>
            </div>
            <div id="latest-summary" class="summary-box"></div>
          </article>
        </section>
      </section>
    </main>

    <script type="module" src="./pages/dashboardOverview.js"></script>
  </body>
</html>
