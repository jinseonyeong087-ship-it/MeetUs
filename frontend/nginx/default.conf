server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health endpoint
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # HTML must be revalidated to avoid stale page shell after deploy.
    location = /index.html {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # JS/CSS are not content-hashed yet, so avoid immutable caching.
    location ~* \.(?:css|js)$ {
        expires -1;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Binary/static assets can be cached longer.
    location ~* \.(?:png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Fallback to index for future client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
