name: backend-ci-cd
on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: ai-minutes-core-api
  ECS_CLUSTER: ai-minutes-cluster
  ECS_SERVICE: ai-minutes-core-api-service
  ECS_TASK_DEFINITION_TEMPLATE: backend/deploy/taskdef-core-api.template.json
  ECS_CONTAINER_NAME: core-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TA_AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            ./backend

      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Summary
        run: |
          echo "Pushed image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"

      - name: Render ECS task definition
        run: |
          jq \
            --arg image "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}" \
            --arg containerName "${{ env.ECS_CONTAINER_NAME }}" \
            '
            .containerDefinitions[0].name = $containerName
            | .containerDefinitions[0].image = $image
            ' \
            "${{ env.ECS_TASK_DEFINITION_TEMPLATE }}" > taskdef-core-api.json

      - name: Register ECS task definition
        id: register-task-def
        run: |
          task_definition_arn=$(aws ecs register-task-definition \
            --cli-input-json file://taskdef-core-api.json \
            --region "${{ env.AWS_REGION }}" \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "task_definition_arn=$task_definition_arn" >> "$GITHUB_OUTPUT"

      - name: Deploy updated task definition
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition ${{ steps.register-task-def.outputs.task_definition_arn }} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}

      - name: Deployment summary
        run: |
          echo "Registered task definition: ${{ steps.register-task-def.outputs.task_definition_arn }}"
