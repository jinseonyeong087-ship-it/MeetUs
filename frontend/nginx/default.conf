server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Health endpoint
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Cache static assets
    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # SPA-ish fallback (if later router added)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
